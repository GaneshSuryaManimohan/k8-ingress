apiVersion: apps/v1
kind: Deployment
metadata:
  name: app2
  # these are deployment level labels, they are not used for selecting pods, but can be useful for organizing and managing deployments
  labels:
    app: app2
    purpose: ingress-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app2
      purpose: ingress-demo
  # the template section defines the pod template that will be used to create pods for this deployment
  template:
    metadata:
      labels:
        app: app2
        purpose: ingress-demo
    spec:
      containers:
        - name: app2
          image: tgsmanimohan/app2:1.1
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: app2-service
spec:
  selector:
    app: app2
    purpose: ingress-demo
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app2-ingress
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/tags: Environment=dev,Team=test
    alb.ingress.kubernetes.io/group.name: my-team.awesome-group
    alb.ingress.kubernetes.io/healthcheck-path: /health
spec:
  ingressClassName: alb
  rules:
  - host: "app2.surya-devops.site"
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: app2-service
            port:
              number: 80