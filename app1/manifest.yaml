apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  # these are deployment level labels, they are not used for selecting pods, but can be useful for organizing and managing deployments
  labels:
    app: app1
    purpose: ingress-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1
      purpose: ingress-demo
  # the template section defines the pod template that will be used to create pods for this deployment
  template:
    metadata:
      labels:
        app: app1
        purpose: ingress-demo
    spec:
      containers:
        - name: app1
          image: tgsmanimohan/app1:1.0
---
apiVersion: v1
kind: Service
metadata:
  name: app1-service
spec:
  selector:
    app: app1
    purpose: ingress-demo
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app1-ingress
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/tags: Environment=dev,Team=test
    alb.ingress.kubernetes.io/group.name: my-team.awesome-group
    kubernetes.io/ingress.class: alb
spec:
  rules:
  - host: "app1.surya-devops.site"
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: app1-service
            port:
              number: 80